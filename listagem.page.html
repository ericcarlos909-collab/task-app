<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Minhas Tarefas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="tarefas.length === 0" class="ion-text-center">
    <ion-text color="medium">
      <p>Nenhuma tarefa pendente! 🎉</p>
    </ion-text>
  </div>

  <ion-list *ngIf="tarefas.length > 0">
    <ion-item *ngFor="let tarefa of tarefas" appHighlight>
      <ion-label>
        <h2>{{ tarefa.titulo }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
